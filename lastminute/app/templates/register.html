{% extends "base.html" %}
{% block title %}Create account · Last-Minute Life Saver{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark brand-mark--lg">LM</span>
      <h1>Last-Minute<br>Life Saver</h1>
      <p class="auth-tag">A productivity companion that tells you exactly what to do, right now.</p>
    </div>
    <form method="post" class="form-stack">
      <label>Username
        <input type="text" name="username" required autofocus>
      </label>
      <label>Email
        <input type="email" name="email" required>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
