{% extends "base.html" %}
{% block title %}Log in · Last-Minute Life Saver{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark brand-mark--lg">LM</span>
      <h1>Last-Minute<br>Life Saver</h1>
      <p class="auth-tag">Stop reading reminders. Start acting on them.</p>
    </div>
    <form method="post" class="form-stack">
      <label>Username or email
        <input type="text" name="identifier" required autofocus>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p class="auth-switch">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
